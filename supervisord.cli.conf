[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

; ── nginx (public-facing reverse proxy — routes /health /tasks → 8003, / → 3001) ─
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=5
startsecs=2
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=5

; ── CLI Worker FastAPI (task queue API — internal port 8003) ──────────────────
[program:cli-worker]
command=uvicorn cli_worker.main:app --host 127.0.0.1 --port 8003 --workers 1
directory=/app
autostart=true
autorestart=true
startretries=10
startsecs=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10
environment=HOME="/root"

; ── code-server / VSCode (port 3001 — internal only, served via nginx /) ──────
[program:code-server]
command=/usr/bin/code-server --bind-addr 127.0.0.1:3001 --auth password --disable-telemetry --disable-update-check /workspace
directory=/workspace
autostart=true
autorestart=true
startretries=20
startsecs=8
stopwaitsecs=15
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/root",PATH="/opt/flutter/bin:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",PASSWORD="%(ENV_UI_PASSWORD)s",PORT="3001",ANDROID_HOME="/opt/android-sdk",FLUTTER_HOME="/opt/flutter",JAVA_HOME="/usr/lib/jvm/java-17-openjdk-amd64"
priority=20
