[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# Repo bootstrap: clone /workspace/super-agent so Claude B has project context
# and full tool access (CLAUDE.md, workflow files, patch scripts, git ops).
# priority=1 → runs before all other programs. autorestart=false → one-shot.
[program:repo-bootstrap]
command=/bin/bash /app/scripts/bootstrap_repo.sh
autostart=true
autorestart=false
startsecs=0
exitcodes=0,1
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:legion-api]
command=uvicorn app.main:app --host 127.0.0.1 --port 8010 --log-config /app/app/log_config.json
directory=/app
autostart=true
autorestart=true
startsecs=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# Ollama: autostart=true. Process is local-only (binds 127.0.0.1:11434),
# uses minimal resources when idle, and the OllamaAgent gates actual usage
# on OLLAMA_ENABLED env var. Models are stored at /workspace/legion/ollama/
# (set via Railway env OLLAMA_MODELS) so they persist across rebuilds.
[program:ollama]
command=ollama serve
environment=OLLAMA_HOST="127.0.0.1:11434",OLLAMA_MAX_LOADED_MODELS="1",OLLAMA_MODELS="/workspace/legion/ollama"
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# Ollama bootstrap: pulls the default base model on first boot (idempotent —
# `ollama pull` is a no-op if model is already present), then issues a tiny
# warmup completion so the model is preloaded in RAM before the first real
# request lands. Without the warmup, CPU-only cold-start (~30-60s for
# llama3.2:3b) blows past the per-request deadline_ms and the agent times out.
[program:ollama-bootstrap]
command=/bin/bash -c "until curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; do sleep 2; done; M=${OLLAMA_DEFAULT_MODEL:-llama3.2:3b}; ollama pull $M || true; curl -sS -m 180 -X POST http://127.0.0.1:11434/api/generate -d \"{\\\"model\\\":\\\"$M\\\",\\\"prompt\\\":\\\"hi\\\",\\\"stream\\\":false,\\\"keep_alive\\\":\\\"30m\\\"}\" >/dev/null || true; echo 'ollama warmup done'"
autostart=true
autorestart=false
startsecs=0
exitcodes=0,1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=900

# Background health prober (P6.2): every LEGION_PROBE_INTERVAL_S (default
# 1800s = 30 min) walk every enabled agent with a tiny 'OK' prompt and
# upsert agent_health. Lets the dashboard show stale-key / quota state
# without waiting for real user traffic to find it. Exits cleanly when
# LEGION_PROBER_ENABLED=false or LEGION_ENABLED=false.
[program:legion-prober]
command=python -m app.prober
directory=/app
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:claude-b-watchdog]
command=python -m app.claude_b_watchdog
directory=/app
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; The watchdog short-circuits and exits cleanly if DUAL_ACCOUNT_ENABLED=false,
; so it's safe to autostart. It becomes useful once the flag flips.

[program:kimi-keeper]
command=python -m app.kimi_keeper
directory=/app
autostart=false
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# hive-metrics autostart=false at P0/P1 because the app.metrics_flush module
# does not exist yet (scaffolded as empty in P0). Turn on in P2.
[program:hive-metrics]
command=python -m app.metrics_flush
directory=/app
autostart=false
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
