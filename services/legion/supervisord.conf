[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:legion-api]
command=uvicorn app.main:app --host 127.0.0.1 --port 8010 --log-config /app/app/log_config.json
directory=/app
autostart=true
autorestart=true
startsecs=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# Feature-gated programs below are autostart=false at P0/P1. Enable via
# `supervisorctl start <program>` or flip autostart=true in a future phase
# once the corresponding feature flag ships (OLLAMA_ENABLED, DUAL_ACCOUNT_ENABLED,
# KIMI_ENABLED). Avoiding %(ENV_X)s expansion keeps supervisord robust when
# the env var is unset.
[program:ollama]
command=ollama serve
environment=OLLAMA_HOST="127.0.0.1:11434",OLLAMA_MAX_LOADED_MODELS="1"
autostart=false
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:claude-b-watchdog]
command=python -m app.claude_b_watchdog
directory=/app
autostart=false
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:kimi-keeper]
command=python -m app.kimi_keeper
directory=/app
autostart=false
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# hive-metrics autostart=false at P0/P1 because the app.metrics_flush module
# does not exist yet (scaffolded as empty in P0). Turn on in P2.
[program:hive-metrics]
command=python -m app.metrics_flush
directory=/app
autostart=false
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
