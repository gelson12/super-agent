ranking:
  weights:
    alpha_historical: 0.35
    beta_suitability: 0.25
    gamma_latency: 0.10
    delta_reliability: 0.15
    epsilon_cost: 0.05
    zeta_content_depth: 0.10
  min_acceptable_score: 0.35
  cold_start_sample_threshold: 30

hive:
  shortlist_k: 6
  shortlist_max: 9
  deadlines_ms:
    claude_b: 8000
    gemini_b: 25000  # Node CLI cold-starts ~10-16s before first token
    ollama: 4000
    hf: 6000
    mistral: 8000     # API; Codestral can be slower than chat models
    sambanova: 4000   # ~500-1000 tok/s — fast like Cerebras
    deepseek: 30000   # R1 reasoning emits long chain-of-thought; needs headroom
    glm: 15000        # glm-4-flash is fast; z1-flash (reasoning) needs more headroom
  early_termination:
    confidence_min: 0.85
    latency_fraction_max: 0.4
    # Per-task-kind overrides — lower threshold = exit faster on easy tasks
    task_kind_overrides:
      scheduled_tick:
        confidence_min: 0.60   # ticks are low-stakes; exit early, save quota
        latency_fraction_max: 0.25
      agent_invoke:
        confidence_min: 0.85   # real actions need quality; keep default
        latency_fraction_max: 0.4
      admin:
        confidence_min: 0.90   # infra tasks need highest quality answer
        latency_fraction_max: 0.95  # use nearly the full deadline — don't exit early
      bridge_bots:
        confidence_min: 0.92   # business decisions need high-quality consensus
        latency_fraction_max: 0.95  # wait for all agents — never short-circuit

failover:
  primary_to_legion:
    auth_fail_count: 2
    auth_fail_window_s: 60
    consecutive_5xx: 3
    stale_backlog_s: 300
  legion_to_primary:
    consecutive_healthy_beacons: 3
    min_account_a_health: 0.7
    min_dwell_in_legion_s: 90

circuit:
  error_threshold: 5
  cooldown_s:
    claude_b: 300
    gemini_b: 60
    ollama: 15
    hf: 60
    mistral: 60
    sambanova: 60
    deepseek: 120  # R1 quota refills slower — back off longer on burst errors
    glm: 120       # 2-min cooldown; rate limits usually clear within 5 min

modality_priors:
  code:
    claude_b: 0.10
    mistral: 0.10   # Codestral is the dedicated code specialist
    deepseek: 0.05  # R1 reasoning helps for complex/multi-step code
  chat:
    gemini_b: 0.10
    glm: 0.08        # GLM-4-Flash excels at multilingual chat and concise replies
  admin:
    claude_b: 0.50   # always leads the shortlist — only agent with cwd + full tool access
    gemini_b: 0.20   # secondary: Gemini CLI as capable fallback for infra tasks

# ── Refinement layer ──────────────────────────────────────────────────────────
# Runs after pick_winner() to improve answer quality via cross-agent critique,
# conditional re-answer, and chain-of-thought grounding.
#
# Pass 1+2 (critique + re-answer): a fast agent critiques the winner's response;
#   if a real flaw is found the winner re-answers with the critique injected.
# Pass 3 (CoT boost): a reasoning agent produces a thinking trace; the winner
#   re-answers grounded in that trace. Only fires for complexity >= 4.
#
# Set enabled: false to disable all refinement (e.g. for high-throughput / low-latency mode).
refinement:
  enabled: true
  complexity_min: 2              # critique fires from complexity 2 (was 3)
  synthesis_complexity_min: 1    # MoA synthesis fires for ALL tasks (was 2)

  # MoA synthesis (Pass 0) — fuses winner + runner-up when models disagree
  synthesis_enabled: true
  synthesis_deadline_ms: 12000  # slightly more budget for synthesis

  # Cross-agent critique + conditional re-answer
  critique_enabled: true
  critique_deadline_ms: 8000    # more time for elite critique (was 6000)
  refine_deadline_ms: 14000     # more time for re-answer (was 10000)

  # Chain-of-thought boost (complexity >= 3 now, was >= 4)
  cot_enabled: true
  cot_complexity_min: 3         # fire CoT one level earlier than before
  cot_deadline_ms: 20000        # more budget for deep reasoning traces (was 15000)

# ── Per-task-kind refinement overrides ───────────────────────────────────────
# bridge_bots = high-quality business decisions — maximum refinement budget
refinement_task_kind_overrides:
  admin:
    complexity_min: 1            # always refine admin/infra tasks regardless of complexity
    synthesis_complexity_min: 1
    cot_complexity_min: 2        # CoT on any moderately complex admin task
    critique_deadline_ms: 15000
    refine_deadline_ms: 25000
    cot_deadline_ms: 35000
    synthesis_deadline_ms: 20000
  bridge_bots:
    complexity_min: 1            # always refine business decisions
    synthesis_complexity_min: 1
    cot_complexity_min: 2        # CoT on any moderately complex business task
    critique_deadline_ms: 10000
    refine_deadline_ms: 18000
    cot_deadline_ms: 25000
    synthesis_deadline_ms: 15000
  scheduled_tick:
    complexity_min: 4            # skip refinement on simple ticks (save quota)
    synthesis_complexity_min: 3
    cot_complexity_min: 5        # effectively never for ticks
