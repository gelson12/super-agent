ranking:
  weights:
    alpha_historical: 0.35
    beta_suitability: 0.25
    gamma_latency: 0.10
    delta_reliability: 0.15
    epsilon_cost: 0.05
    zeta_content_depth: 0.10
  min_acceptable_score: 0.35
  cold_start_sample_threshold: 30

hive:
  shortlist_k: 3
  shortlist_max: 5
  deadlines_ms:
    claude_b: 8000
    kimi: 6000
    gemini_b: 25000  # Node CLI cold-starts ~10-16s before first token
    ollama: 4000
    hf: 6000
    mistral: 8000     # API; Codestral can be slower than chat models
    sambanova: 4000   # ~500-1000 tok/s — fast like Cerebras
    deepseek: 30000   # R1 reasoning emits long chain-of-thought; needs headroom
  early_termination:
    confidence_min: 0.85
    latency_fraction_max: 0.4

failover:
  primary_to_legion:
    auth_fail_count: 2
    auth_fail_window_s: 60
    consecutive_5xx: 3
    stale_backlog_s: 300
  legion_to_primary:
    consecutive_healthy_beacons: 3
    min_account_a_health: 0.7
    min_dwell_in_legion_s: 90

circuit:
  error_threshold: 5
  cooldown_s:
    claude_b: 300
    kimi: 120
    gemini_b: 60
    ollama: 15
    hf: 60
    mistral: 60
    sambanova: 60
    deepseek: 120  # R1 quota refills slower — back off longer on burst errors

modality_priors:
  code:
    claude_b: 0.10
    kimi: 0.10
    mistral: 0.10   # Codestral is the dedicated code specialist
    deepseek: 0.05  # R1 reasoning helps for complex/multi-step code
  chat:
    gemini_b: 0.10

# ── Refinement layer ──────────────────────────────────────────────────────────
# Runs after pick_winner() to improve answer quality via cross-agent critique,
# conditional re-answer, and chain-of-thought grounding.
#
# Pass 1+2 (critique + re-answer): a fast agent critiques the winner's response;
#   if a real flaw is found the winner re-answers with the critique injected.
# Pass 3 (CoT boost): a reasoning agent produces a thinking trace; the winner
#   re-answers grounded in that trace. Only fires for complexity >= 4.
#
# Set enabled: false to disable all refinement (e.g. for high-throughput / low-latency mode).
refinement:
  enabled: true
  complexity_min: 3         # only refine requests with complexity >= this (1-5)

  # Cross-agent critique + conditional re-answer
  critique_enabled: true
  critique_deadline_ms: 6000   # time budget for the critic call
  refine_deadline_ms: 10000    # time budget for the winner's re-answer

  # Chain-of-thought boost (complexity >= 4 only)
  cot_enabled: true
  cot_deadline_ms: 15000       # total budget split across reasoning + answer calls
