name: Redeploy Inspiring Cat on Railway

# Triggers a FRESH BUILD of inspiring-cat from the latest GitHub commit.
# Use this after pushing code changes — Railway doesn't auto-deploy this service.
#
# Uses serviceInstanceDeploy (fresh build from source) NOT deploymentRedeploy
# (which just restarts the same old Docker image without picking up new code).

on:
  repository_dispatch:
    types: [railway_redeploy_inspiring_cat]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger fresh Railway build for inspiring-cat
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID:        ${{ secrets.RAILWAY_SERVICE_ID }}
          ENV_ID:            ${{ secrets.RAILWAY_ENV_ID }}
        run: |
          if [ -z "$RAILWAY_API_TOKEN" ] || [ -z "$SERVICE_ID" ]; then
            echo "Missing RAILWAY_TOKEN or RAILWAY_SERVICE_ID secrets"
            exit 1
          fi

          # serviceInstanceDeploy triggers a fresh build from the GitHub source
          # (latest commit on the connected branch) — unlike deploymentRedeploy
          # which just replays the same Docker image.
          echo "Triggering fresh build via serviceInstanceDeploy..."
          MUT='mutation($sId:String!,$eId:String!){serviceInstanceDeploy(serviceId:$sId,environmentId:$eId)}'
          VARS=$(printf '{"sId":"%s","eId":"%s"}' "$SERVICE_ID" "$ENV_ID")

          RESP=$(curl -s -w "\n%{http_code}" \
            -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-raw "{\"query\":\"$MUT\",\"variables\":$VARS}" \
            --max-time 20)

          CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "serviceInstanceDeploy HTTP: ${CODE}"
          echo "Response: ${BODY:0:400}"

          if [ "$CODE" = "200" ]; then
            ERRS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); errs=d.get('errors'); print(errs if errs else 'none')" 2>/dev/null)
            if [ "$ERRS" = "none" ] || [ -z "$ERRS" ]; then
              echo "Fresh build triggered successfully — inspiring-cat will rebuild from latest GitHub commit."
              exit 0
            fi
            echo "GraphQL errors: $ERRS"
          fi

          # Fallback: try deploymentCreate
          echo "Trying deploymentCreate fallback..."
          MUT2='mutation($sId:String!,$eId:String!){deploymentCreate(input:{serviceId:$sId,environmentId:$eId}){id status}}'
          VARS2=$(printf '{"sId":"%s","eId":"%s"}' "$SERVICE_ID" "$ENV_ID")

          RESP2=$(curl -s -w "\n%{http_code}" \
            -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-raw "{\"query\":\"$MUT2\",\"variables\":$VARS2}" \
            --max-time 20)

          CODE2=$(echo "$RESP2" | tail -1)
          BODY2=$(echo "$RESP2" | head -n -1)
          echo "deploymentCreate HTTP: ${CODE2}"
          echo "Response: ${BODY2:0:400}"
