name: Proactive Claude Token Renewal

# Runs every 12 hours to keep the Claude CLI token fresh.
#
# Strategy (direct OAuth returns 405 from all IPs including Azure):
#   1. Check inspiring-cat health + token TTL.
#   2. If TTL < 43200s (12h): trigger inspiring-cat's Playwright-based
#      full_recovery_chain() via /webhook/trigger-playwright-refresh.
#      inspiring-cat runs Playwright + n8n magic-link — this always works.
#
# One-time setup (only needed once):
#   1. INSPIRING_CAT_WEBHOOK_SECRET — set in both GitHub Secrets AND Railway Variables

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [proactive_token_renewal]

permissions:
  contents: read

env:
  INSPIRING_CAT_URL: https://inspiring-cat-production.up.railway.app
  SUPER_AGENT_URL:   https://super-agent-production.up.railway.app
  GITHUB_REPO:       gelson12/super-agent

jobs:
  renew-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check inspiring-cat health and token TTL
        id: health
        continue-on-error: true
        run: |
          RESP=$(curl -s -w "\n%{http_code}" "${INSPIRING_CAT_URL}/health" --max-time 10)
          CODE=$(echo "$RESP" | tail -n1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "Health HTTP ${CODE}"

          TTL=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('claude_token_expires_in_s', 0))" 2>/dev/null || echo "0")
          AVAILABLE=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('claude_available', False)).lower())" 2>/dev/null || echo "false")

          echo "token_ttl=${TTL}" >> $GITHUB_OUTPUT
          echo "claude_available=${AVAILABLE}" >> $GITHUB_OUTPUT
          echo "claude_available=${AVAILABLE}, token_ttl=${TTL}s"

          if [ "$CODE" = "200" ] && [ "$AVAILABLE" = "true" ] && [ "${TTL:-0}" -gt 43200 ] 2>/dev/null; then
            echo "Token healthy (${TTL}s remaining, >12h) — skipping renewal."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Token needs renewal (ttl=${TTL}s, available=${AVAILABLE}) — proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if token fresh
        if: steps.health.outputs.skip == 'true'
        run: echo "Token valid for >12h — no renewal needed this cycle."

      - name: Trigger inspiring-cat Playwright refresh
        id: playwright-trigger
        if: steps.health.outputs.skip != 'true'
        env:
          WEBHOOK_SECRET: ${{ secrets.INSPIRING_CAT_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "ERROR: INSPIRING_CAT_WEBHOOK_SECRET not set — cannot trigger Playwright refresh."
            echo "triggered=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Triggering inspiring-cat Playwright-based token refresh..."
          PAYLOAD=$(printf '{"secret":"%s"}' "$WEBHOOK_SECRET")

          RESP=$(curl -s -w "\n%{http_code}" \
            -X POST "${INSPIRING_CAT_URL}/webhook/trigger-playwright-refresh" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --max-time 20)

          CODE=$(echo "$RESP" | tail -n1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "trigger-playwright-refresh: HTTP ${CODE}"
          echo "Response: ${BODY:0:200}"

          if [ "$CODE" = "200" ]; then
            echo "Playwright refresh triggered — inspiring-cat running full_recovery_chain() in background."
            echo "triggered=true" >> $GITHUB_OUTPUT
          else
            echo "Failed to trigger Playwright refresh (HTTP ${CODE})"
            echo "triggered=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Alert on failure
        if: failure()
        env:
          N8N_WEBHOOK: ${{ secrets.N8N_ALERT_WEBHOOK }}
          TTL:         ${{ steps.health.outputs.token_ttl }}
          AVAILABLE:   ${{ steps.health.outputs.claude_available }}
        run: |
          HOURS_LEFT=$(echo "${TTL:-0}" | awk '{printf "%.1f", $1/3600}')
          curl -s -X POST "${N8N_WEBHOOK:-https://httpbin.org/post}" \
            -H "Content-Type: application/json" \
            -d "{\"alert\":\"proactive_renewal_failed\",\"source\":\"github_actions_cron\",\"token_hours_remaining\":\"${HOURS_LEFT}\",\"claude_available\":\"${AVAILABLE}\",\"message\":\"Proactive token renewal FAILED. Token has ${HOURS_LEFT}h remaining. inspiring-cat may be down.\"}" \
            --max-time 10 || true
          echo "RENEWAL TRIGGER FAILED — token TTL remaining: ${HOURS_LEFT}h"
