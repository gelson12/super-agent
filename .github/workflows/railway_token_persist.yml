name: Railway Token Persist — Layer 2

# ─────────────────────────────────────────────────────────────────────────────
# MUTED (7 May 2026) — see Finance Ops record.
# Token refresh chain broken. RAILWAY_TOKEN GitHub secret is stale/expired.
# Scheduled sentinel and dispatch trigger both bypassed silently.
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [railway_token_persist]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip Railway update (for testing)'
        type: boolean
        default: false

env:
  INSPIRING_CAT_URL: https://inspiring-cat-production.up.railway.app
  SUPER_AGENT_URL: https://super-agent-production.up.railway.app

jobs:
  update-railway-env:
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⛔ MUTED — all dispatch jobs skipped
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "⛔ Layer 2 update-railway-env muted (7 May 2026)."
          echo "Reason: RAILWAY_TOKEN GitHub secret stale."
          echo "Unmute: generate fresh Railway API token and update secret."
          exit 0

      - name: Extract payload
        id: payload
        run: |
          VARIABLE="${{ github.event.client_payload.variable_name }}"
          EXPIRES="${{ github.event.client_payload.expires_at }}"
          TTL="${{ github.event.client_payload.ttl_seconds }}"
          TRIGGER="${{ github.event.client_payload.trigger }}"
          NONCE="${{ github.event.client_payload.nonce }}"
          CALLBACK="${{ github.event.client_payload.callback_url }}"

          VARIABLE="${VARIABLE:-CLAUDE_SESSION_TOKEN}"
          TRIGGER="${TRIGGER:-manual}"

          echo "variable=${VARIABLE}"      >> $GITHUB_OUTPUT
          echo "expires_at=${EXPIRES}"     >> $GITHUB_OUTPUT
          echo "ttl_seconds=${TTL}"        >> $GITHUB_OUTPUT
          echo "trigger_type=${TRIGGER}"   >> $GITHUB_OUTPUT
          echo "nonce=${NONCE}"            >> $GITHUB_OUTPUT
          echo "callback_url=${CALLBACK}"  >> $GITHUB_OUTPUT

          echo "RAILWAY_TOKEN_VALUE=${{ github.event.client_payload.token }}" >> $GITHUB_ENV

          echo "Trigger: ${TRIGGER} | Variable: ${VARIABLE} | TTL: ${TTL}s"
          if [ -n "$TTL" ] && [ "$TTL" -lt 7200 ] 2>/dev/null; then
            echo "⚠️  TTL below 2h — escalation trigger"
          fi

      - name: Abort if no token (manual dry-run only)
        if: env.RAILWAY_TOKEN_VALUE == '' && github.event_name == 'repository_dispatch'
        run: |
          echo "ERROR: dispatch payload missing token field"
          exit 1

      - name: Load Railway service IDs from secrets
        id: ids
        run: |
          PROJECT_ID="${{ secrets.RAILWAY_PROJECT_ID }}"
          SERVICE_ID="${{ secrets.RAILWAY_SERVICE_ID }}"
          ENV_ID="${{ secrets.RAILWAY_ENV_ID }}"

          echo "project_id=${PROJECT_ID}" >> $GITHUB_OUTPUT
          echo "service_id=${SERVICE_ID}" >> $GITHUB_OUTPUT
          echo "env_id=${ENV_ID}"         >> $GITHUB_OUTPUT

          if [ -z "$SERVICE_ID" ] || [ -z "$PROJECT_ID" ] || [ -z "$ENV_ID" ]; then
            echo "ERROR: RAILWAY_PROJECT_ID / RAILWAY_SERVICE_ID / RAILWAY_ENV_ID secrets not set"
            exit 1
          fi

          echo "✅ service=${SERVICE_ID} project=${PROJECT_ID} env=${ENV_ID}"

      - name: Update Railway env var (3 attempts with backoff)
        id: update
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID:        ${{ steps.ids.outputs.project_id }}
          SERVICE_ID:        ${{ steps.ids.outputs.service_id }}
          ENV_ID:            ${{ steps.ids.outputs.env_id }}
          VARIABLE_NAME:     ${{ steps.payload.outputs.variable }}
          DRY_RUN:           ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — Railway update skipped"
            echo "success=true" >> $GITHUB_OUTPUT
            echo "attempts=0"  >> $GITHUB_OUTPUT
            exit 0
          fi

          _do_update() {
            MUTATION='mutation($i: VariableUpsertInput!) { variableUpsert(input: $i) }'
            VARS=$(jq -nc \
              --arg p "$PROJECT_ID" --arg s "$SERVICE_ID" \
              --arg e "$ENV_ID"     --arg n "$VARIABLE_NAME" \
              --arg v "$RAILWAY_TOKEN_VALUE" \
              '{"i":{"projectId":$p,"serviceId":$s,"environmentId":$e,"name":$n,"value":$v}}')

            curl -s -w "\n%{http_code}" \
              -X POST "https://backboard.railway.app/graphql/v2" \
              -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"${MUTATION}\",\"variables\":${VARS}}" \
              --max-time 20
          }

          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3…"
            RESP=$(_do_update)
            CODE=$(echo "$RESP" | tail -n1)
            BODY=$(echo "$RESP" | head -n -1)

            echo "HTTP ${CODE}"

            if [ "$CODE" = "200" ]; then
              ERRS=$(echo "$BODY" | jq -r '.errors // empty' 2>/dev/null)
              if [ -z "$ERRS" ]; then
                echo "✅ CLAUDE_SESSION_TOKEN updated in Railway (attempt ${attempt})"
                echo "success=true"         >> $GITHUB_OUTPUT
                echo "attempts=${attempt}"  >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "GraphQL errors: ${ERRS}"
            fi

            [ $attempt -lt 3 ] && sleep $((attempt * 12))
          done

          echo "❌ All 3 attempts failed"
          echo "success=false" >> $GITHUB_OUTPUT
          echo "attempts=3"    >> $GITHUB_OUTPUT
          exit 1

      - name: Alert n8n on failure
        if: failure()
        env:
          N8N_WEBHOOK: ${{ secrets.N8N_ALERT_WEBHOOK }}
          TRIGGER:     ${{ steps.payload.outputs.trigger_type }}
          TTL:         ${{ steps.payload.outputs.ttl_seconds }}
        run: |
          curl -s -X POST "${N8N_WEBHOOK}" \
            -H "Content-Type: application/json" \
            -d "{\"alert\":\"layer2_railway_update_failed\",\"trigger\":\"${TRIGGER}\",\"ttl_seconds\":\"${TTL}\",\"message\":\"Layer 2: GitHub Actions failed to update CLAUDE_SESSION_TOKEN after 3 attempts\"}" \
            --max-time 10 || true

      - name: Post result back to super-agent
        if: always() && steps.payload.outputs.callback_url != ''
        env:
          CALLBACK_URL:    ${{ steps.payload.outputs.callback_url }}
          CALLBACK_SECRET: ${{ secrets.INSPIRING_CAT_WEBHOOK_SECRET }}
          NONCE:           ${{ steps.payload.outputs.nonce }}
          SUCCESS:         ${{ steps.update.outputs.success }}
          ATTEMPTS:        ${{ steps.update.outputs.attempts }}
          TRIGGER:         ${{ steps.payload.outputs.trigger_type }}
          TTL:             ${{ steps.payload.outputs.ttl_seconds }}
        run: |
          SUCCESS_BOOL=$([ "$SUCCESS" = "true" ] && echo "true" || echo "false")
          PAYLOAD=$(jq -nc \
            --arg   nonce        "$NONCE" \
            --argjson success    "$SUCCESS_BOOL" \
            --arg   secret       "$CALLBACK_SECRET" \
            --arg   attempts     "${ATTEMPTS:-0}" \
            --arg   ts           "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg   trigger_type "${TRIGGER:-unknown}" \
            --arg   ttl          "${TTL:-0}" \
            '{nonce:$nonce, success:$success, secret:$secret,
              attempts:($attempts|tonumber), completed_at:$ts,
              trigger_type:$trigger_type,
              ttl_seconds:($ttl|tonumber),
              layer:"2_github_actions"}')

          curl -s -o /dev/null -w "Callback HTTP: %{http_code}\n" \
            -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --max-time 15 || echo "Callback unreachable (non-critical)"

  scheduled-sentinel:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: ⛔ MUTED — scheduled sentinel skipped
        run: |
          echo "⛔ Layer 2 scheduled-sentinel muted (7 May 2026)."
          echo "Reason: RAILWAY_TOKEN GitHub secret stale."
          echo "Unmute: generate fresh Railway API token and update secret."
          exit 0

      - name: Request token sync from super-agent
        if: false
        id: ping
        env:
          WEBHOOK_SECRET: ${{ secrets.INSPIRING_CAT_WEBHOOK_SECRET }}
        run: |
          echo "Scheduled sentinel — requesting railway sync from super-agent…"

          RESP=$(curl -s -w "\n%{http_code}" \
            -X POST "${SUPER_AGENT_URL}/webhook/github-scheduled-sync" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" \
            -d "{\"source\":\"github_scheduled_sentinel\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            --max-time 15)

          CODE=$(echo "$RESP" | tail -n1)
          BODY=$(echo "$RESP" | head -n -1)

          echo "HTTP ${CODE}"
          echo "container_http=${CODE}" >> $GITHUB_OUTPUT

          if [ "$CODE" = "200" ]; then
            echo "✅ Sync requested — super-agent will fire a dispatch with current token"
          elif [ "$CODE" = "403" ]; then
            echo "⚠️  Unauthorized — check INSPIRING_CAT_WEBHOOK_SECRET secret matches super-agent INSPIRING_CAT_WEBHOOK_SECRET env var"
            echo "container_unreachable=false" >> $GITHUB_OUTPUT
          else
            echo "❌ super-agent unreachable or error (HTTP ${CODE})"
            echo "container_unreachable=true" >> $GITHUB_OUTPUT
          fi

      - name: Alert if container unreachable
        if: false
        env:
          N8N_WEBHOOK: ${{ secrets.N8N_ALERT_WEBHOOK }}
          CODE:        ${{ steps.ping.outputs.container_http }}
        run: |
          curl -s -X POST "${N8N_WEBHOOK}" \
            -H "Content-Type: application/json" \
            -d "{\"alert\":\"layer2_sentinel_container_unreachable\",\"http_code\":\"${CODE}\",\"message\":\"Layer 2 scheduled sentinel: super-agent did not respond — possible outage\"}" \
            --max-time 10 || true

      - name: Also check Layer 4 health + fallback dispatch if super-agent was down
        if: false
        id: health
        env:
          N8N_WEBHOOK: ${{ secrets.N8N_ALERT_WEBHOOK }}
          SUPER_AGENT_DOWN: ${{ steps.ping.outputs.container_unreachable }}
        run: |
          RESP=$(curl -s -w "\n%{http_code}" \
            "${INSPIRING_CAT_URL}/health" \
            --max-time 10)
          CODE=$(echo "$RESP" | tail -n1)
          BODY=$(echo "$RESP" | head -n -1)

          echo "Health check HTTP ${CODE}"

          if [ "$CODE" = "200" ]; then
            PRO=$(echo "$BODY" | jq -r '.pro_cli_available // .claude_available // false')
            TTL=$(echo "$BODY" | jq -r '.token_ttl_seconds // .claude_token_expires_in_s // 0')
            echo "claude_available=${PRO}, ttl=${TTL}s"
            echo "ttl_seconds=${TTL}" >> $GITHUB_OUTPUT

            if [ "$PRO" = "false" ]; then
              echo "⚠️  Layer 4 CLI down — alerting n8n"
              curl -s -X POST "${N8N_WEBHOOK}" \
                -H "Content-Type: application/json" \
                -d "{\"alert\":\"layer4_cli_down_detected\",\"source\":\"github_sentinel\",\"ttl_seconds\":\"${TTL}\",\"message\":\"Layer 4: CLI unavailable during scheduled Layer 2 sentinel check\"}" \
                --max-time 10 || true
            else
              echo "✅ Layer 4 healthy — token valid for ${TTL}s"
            fi

            if [ "${SUPER_AGENT_DOWN}" = "true" ] && [ "$PRO" = "true" ]; then
              echo "⚠️  super-agent down but inspiring-cat healthy — noting for alerting"
              echo "Trigger A (inspiring-cat → GitHub) and Trigger C (6h proactive) remain active independently."
            fi
          else
            echo "❌ inspiring-cat unreachable (HTTP ${CODE})"
            curl -s -X POST "${N8N_WEBHOOK}" \
              -H "Content-Type: application/json" \
              -d "{\"alert\":\"layer4_inspiring_cat_unreachable\",\"http_code\":\"${CODE}\",\"message\":\"Both super-agent and inspiring-cat unreachable — full token resilience at risk\"}" \
              --max-time 10 || true
          fi
