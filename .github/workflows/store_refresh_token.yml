name: Store Refresh Token Secret

# ─────────────────────────────────────────────────────────────────────────────
# MUTED (7 May 2026) — see Finance Ops record.
# Falls 4 seconds after dispatch because GH_PAT secret is missing/expired.
# gh secret set commands cannot authenticate without a valid PAT.
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [store_refresh_token]

permissions:
  contents: read

env:
  GITHUB_REPO: gelson12/super-agent

jobs:
  store-secret:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: ⛔ MUTED — store-refresh-token job skipped
        run: |
          echo "⛔ Store Refresh Token Secret muted (7 May 2026)."
          echo "Reason: GH_PAT secret missing or expired (4s failure)."
          echo "Unmute: generate fresh GitHub PAT with repo scope and update GH_PAT secret."
          exit 0

      - name: Store CLAUDE_REFRESH_TOKEN and CLAUDE_CLIENT_ID secrets
        if: false
        env:
          GH_TOKEN:      ${{ secrets.GH_PAT }}
          REFRESH_TOKEN: ${{ github.event.client_payload.refresh_token }}
          CLIENT_ID:     ${{ github.event.client_payload.client_id }}
        run: |
          if [ -z "$REFRESH_TOKEN" ]; then
            echo "ERROR: dispatch payload missing refresh_token — skipping."
            exit 1
          fi

          echo "Storing rotated CLAUDE_REFRESH_TOKEN secret..."
          echo "$REFRESH_TOKEN" | gh secret set CLAUDE_REFRESH_TOKEN --repo "$GITHUB_REPO"
          echo "✅ CLAUDE_REFRESH_TOKEN updated."

          if [ -n "$CLIENT_ID" ]; then
            echo "$CLIENT_ID" | gh secret set CLAUDE_CLIENT_ID --repo "$GITHUB_REPO"
            echo "✅ CLAUDE_CLIENT_ID confirmed."
          fi

          echo "Proactive renewal cron is now armed with the latest refresh_token."
