<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <!-- Main gold gradient: deep warm gold to bright highlight -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF0A0"/>
      <stop offset="18%"  stop-color="#F5C842"/>
      <stop offset="45%"  stop-color="#B8860B"/>
      <stop offset="72%"  stop-color="#8B6508"/>
      <stop offset="100%" stop-color="#5C4100"/>
    </linearGradient>
    <!-- Sheen gradient for towers / highlight surfaces -->
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFBE0"/>
      <stop offset="30%"  stop-color="#F5C842"/>
      <stop offset="60%"  stop-color="#C8960C"/>
      <stop offset="100%" stop-color="#7A5200"/>
    </linearGradient>
    <!-- Cable gradient -->
    <linearGradient id="goldCable" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="50%"  stop-color="#C8960C"/>
      <stop offset="100%" stop-color="#7A5200"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE57A"/>
      <stop offset="35%"  stop-color="#D4A017"/>
      <stop offset="70%"  stop-color="#8B6508"/>
      <stop offset="100%" stop-color="#5C4100"/>
    </linearGradient>
    <!-- Subtle inner shine for 3D effect -->
    <filter id="innerShine">
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.15"/>
        <feFuncG type="linear" slope="1.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- ── Arch / road base ─────────────────────────────────── -->
  <path d="M 40 185 Q 200 100 360 185"
        fill="none" stroke="url(#goldMain)" stroke-width="12" stroke-linecap="round"/>

  <!-- ── Road deck ────────────────────────────────────────── -->
  <rect x="38" y="183" width="324" height="10" rx="4"
        fill="url(#goldMain)"/>

  <!-- ── Left tower ───────────────────────────────────────── -->
  <!-- shaft -->
  <rect x="120" y="90" width="18" height="95" rx="3" fill="url(#goldSheen)"/>
  <!-- cross beam -->
  <rect x="110" y="118" width="38" height="8" rx="2" fill="url(#goldSheen)"/>
  <!-- top cap -->
  <polygon points="120,75 138,75 141,92 117,92" fill="url(#goldSheen)"/>
  <!-- finial -->
  <rect x="127" y="65" width="6" height="12" rx="2" fill="#FFE57A"/>

  <!-- ── Right tower ───────────────────────────────────────── -->
  <rect x="262" y="90" width="18" height="95" rx="3" fill="url(#goldSheen)"/>
  <rect x="252" y="118" width="38" height="8" rx="2" fill="url(#goldSheen)"/>
  <polygon points="262,75 280,75 283,92 259,92" fill="url(#goldSheen)"/>
  <rect x="267" y="65" width="6" height="12" rx="2" fill="#FFE57A"/>

  <!-- ── Main suspension cables ────────────────────────────── -->
  <!-- Left side: tower top → left anchor -->
  <path d="M 129 68 Q 85 135 40 190"
        fill="none" stroke="url(#goldCable)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left side: tower top → center -->
  <path d="M 129 68 Q 165 140 200 192"
        fill="none" stroke="url(#goldCable)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right side: tower top → right anchor -->
  <path d="M 271 68 Q 315 135 360 190"
        fill="none" stroke="url(#goldCable)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right side: tower top → center -->
  <path d="M 271 68 Q 235 140 200 192"
        fill="none" stroke="url(#goldCable)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── Vertical hangers (left tower) ─────────────────────── -->
  <line x1="95"  y1="160" x2="95"  y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>
  <line x1="112" y1="148" x2="112" y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>
  <line x1="148" y1="148" x2="148" y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>
  <line x1="165" y1="160" x2="165" y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>

  <!-- ── Vertical hangers (right tower) ────────────────────── -->
  <line x1="305" y1="160" x2="305" y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>
  <line x1="288" y1="148" x2="288" y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>
  <line x1="252" y1="148" x2="252" y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>
  <line x1="235" y1="160" x2="235" y2="192" stroke="url(#goldCable)" stroke-width="2.2"/>

  <!-- ── BRIDGE text ───────────────────────────────────────── -->
  <text x="200" y="242"
        font-family="'Trajan Pro', 'Times New Roman', Georgia, serif"
        font-size="46"
        font-weight="700"
        letter-spacing="10"
        text-anchor="middle"
        fill="url(#goldText)">BRIDGE</text>

  <!-- ── Highlight sheen on text (top edge catch-light) ────── -->
  <text x="200" y="242"
        font-family="'Trajan Pro', 'Times New Roman', Georgia, serif"
        font-size="46"
        font-weight="700"
        letter-spacing="10"
        text-anchor="middle"
        fill="none"
        stroke="#FFE57A"
        stroke-width="0.4"
        opacity="0.55">BRIDGE</text>
</svg>
