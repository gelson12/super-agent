<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Bridge logo glow animation ─────────────────────────────────────────── */
    @keyframes logo-glow {
      0%, 100% {
        filter: drop-shadow(0 0 2px #c9a227)
                drop-shadow(0 0 4px rgba(201,162,39,0.4));
      }
      50% {
        filter: drop-shadow(0 0 3px #c9a227)
                drop-shadow(0 0 8px rgba(201,162,39,0.25));
      }
    }

    .bridge-logo {
      display: block;
      animation: logo-glow 2.4s ease-in-out infinite;
      /* White background removal via canvas is applied in JS */
    }

    /* ── Login screen ─────────────────────────────────────────────────────── */
    #lock-screen {
      position: fixed; inset: 0;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 999;
    }
    #lock-screen.hidden { display: none; }

    .lock-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-logo-wrap .bridge-logo {
      height: 110px;
      width: auto;
    }

    .lock-card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 36px 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .lock-card h2 { font-size: 18px; font-weight: 600; }
    .lock-card p { font-size: 13px; color: #666; text-align: center; }

    #pw-input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e8e8e8;
      font-size: 14px;
      outline: none;
    }
    #pw-input:focus { border-color: #c9a227; }

    #pw-submit {
      width: 100%;
      background: linear-gradient(135deg, #9a7920, #c9a227, #9a7920);
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.5px;
    }
    #pw-submit:hover { opacity: 0.85; }

    #pw-error {
      font-size: 12px;
      color: #ef4444;
      display: none;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      padding: 10px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #141414;
      position: relative;
      min-height: 60px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      flex-shrink: 0;
    }

    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
    }

    .header-center .bridge-logo {
      height: 44px;
      width: auto;
    }

    header span { font-size: 12px; color: #666; }

    /* ── Chat ─────────────────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message { display: flex; flex-direction: column; max-width: 72%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    /* rendered markdown inside bubbles */
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble ul, .bubble ol { padding-left: 18px; margin-bottom: 8px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "Fira Mono", monospace;
      font-size: 13px;
    }
    .bubble pre {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; font-size: 13px; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 6px; font-weight: 600; }
    .bubble blockquote {
      border-left: 3px solid #c9a227;
      padding-left: 10px;
      color: #999;
      margin: 6px 0;
    }
    .bubble table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid #333; padding: 6px 10px; }
    .bubble th { background: #1a1a1a; }

    .message.user .bubble {
      background: linear-gradient(135deg, #7a5e10, #c9a227);
      color: #000;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
      font-weight: 500;
    }
    .message.agent .bubble {
      background: #1e1e1e;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .speak-btn {
      background: none; border: none; cursor: pointer;
      color: #555; padding: 0; font-size: 14px; line-height: 1;
      transition: color 0.2s;
    }
    .speak-btn:hover { color: #c9a227; }

    .typing .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #666;
      font-style: italic;
      white-space: pre-wrap;
    }

    /* ── Input area ───────────────────────────────────────────────────────── */
    #input-area {
      padding: 12px 24px;
      border-top: 1px solid #222;
      background: #141414;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e8e8;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.5;
    }
    #input:focus { border-color: #c9a227; }
    #input::placeholder { color: #444; }

    .icon-btn {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      width: 48px; height: 48px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: #888; font-size: 18px;
    }
    .icon-btn:hover { border-color: #c9a227; color: #c9a227; }
    .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .icon-btn.recording { border-color: #ef4444; color: #ef4444; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
    }

    #send {
      background: linear-gradient(135deg, #9a7920, #c9a227);
      border: none; border-radius: 12px;
      width: 48px; height: 48px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s;
    }
    #send:hover { opacity: 0.85; }
    #send:disabled { background: #333; cursor: not-allowed; opacity: 1; }
    #send svg { fill: #000; }

    #image-input { display: none; }

    .image-preview {
      max-width: 260px; max-height: 180px;
      border-radius: 10px; margin-bottom: 6px;
      border: 1px solid #2a2a2a;
    }

    /* ── Empty state ──────────────────────────────────────────────────────── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }

    .cursor {
      display: inline-block;
      animation: blink 0.7s step-end infinite;
      color: #c9a227;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Lock screen ──────────────────────────────────────────────────────────── -->
<div id="lock-screen">
  <div class="lock-logo-wrap">
    <img class="bridge-logo" id="lock-logo" src="/static/bridge.svg" alt="Bridge" crossorigin="anonymous" />
  </div>
  <div class="lock-card">
    <h2>Super Agent</h2>
    <p>Enter your access password to continue.</p>
    <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" />
    <div id="pw-error">Incorrect password. Try again.</div>
    <button id="pw-submit" onclick="submitPassword()">Unlock</button>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="dot"></div>
    <span id="session-label" style="font-size:12px;color:#666;">Session: default</span>
  </div>
  <div class="header-center">
    <img class="bridge-logo" id="header-logo" src="/static/bridge.svg" alt="Bridge" crossorigin="anonymous" />
  </div>
  <div style="width:80px;"></div><!-- spacer to balance the left side -->
</header>

<div id="chat">
  <div class="empty-state" id="empty"></div>
</div>

<div id="input-area">
  <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif,image/webp" onchange="handleImageSelected()" />
  <button class="icon-btn" id="img-btn" title="Attach image" onclick="document.getElementById('image-input').click()">🖼</button>
  <button class="icon-btn" id="mic-btn" title="Click to record voice" onclick="toggleRecording()">🎙</button>
  <textarea id="input" placeholder="Message the super agent..." rows="1"></textarea>
  <button id="send" onclick="sendMessage()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
  // ── Remove white background from logo images via canvas ──────────────────────
  function removeWhiteBg(imgEl) {
    if (!imgEl.complete || imgEl.naturalWidth === 0) return;
    try {
      const canvas = document.createElement('canvas');
      canvas.width = imgEl.naturalWidth;
      canvas.height = imgEl.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(imgEl, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        // Make near-white pixels fully transparent
        if (r > 210 && g > 210 && b > 210) {
          d[i + 3] = 0;
        }
        // Soft edge: slightly off-white pixels fade out
        else if (r > 180 && g > 180 && b > 180) {
          const whiteness = (r + g + b) / 3;
          d[i + 3] = Math.round((1 - (whiteness - 180) / 30) * 255);
        }
      }
      ctx.putImageData(imageData, 0, 0);
      imgEl.src = canvas.toDataURL('image/png');
    } catch (e) {
      // CORS or tainted canvas — skip silently, logo still shows
    }
  }

  // Apply white removal to all logo instances when they load
  ['lock-logo', 'header-logo'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      if (el.complete && el.naturalWidth > 0) {
        removeWhiteBg(el);
      } else {
        el.addEventListener('load', () => removeWhiteBg(el));
      }
    }
  });

  // ── Auth ────────────────────────────────────────────────────────────────────
  let accessToken = sessionStorage.getItem('sa_token') || '';

  async function submitPassword() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    try {
      const res = await fetch('/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (res.ok) {
        accessToken = pw;
        sessionStorage.setItem('sa_token', pw);
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('pw-error').style.display = 'none';
      } else {
        document.getElementById('pw-error').style.display = 'block';
        document.getElementById('pw-input').value = '';
      }
    } catch {
      document.getElementById('pw-error').style.display = 'block';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPassword();
  });

  // Auto-unlock if already have token
  (async () => {
    if (!accessToken) return;
    const res = await fetch('/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: accessToken }),
    });
    if (res.ok) {
      document.getElementById('lock-screen').classList.add('hidden');
    } else {
      sessionStorage.removeItem('sa_token');
      accessToken = '';
    }
  })();

  function authHeaders(extra = {}) {
    return { 'X-Token': accessToken, ...extra };
  }

  // ── Session / UI ────────────────────────────────────────────────────────────
  const sessionId = 'web-' + Math.random().toString(36).slice(2, 9);
  document.getElementById('session-label').textContent = 'Session: ' + sessionId;

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const micBtn = document.getElementById('mic-btn');
  let hasMessages = false;

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  // ── Markdown rendering ──────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  function renderMarkdown(text) {
    text = text.replace(/\\boxed\{([^}]+)\}/g, '**$1**');
    text = text.replace(/\\text\{([^}]*)\}/g, '$1');
    text = text.replace(/\\\[/g, '').replace(/\\\]/g, '').replace(/\\\(/g, '').replace(/\\\)/g, '');
    text = text.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1/$2)');
    text = text.replace(/\\times/g, '×');
    text = text.replace(/\\cdot/g, '·');
    text = text.replace(/\\sqrt\{([^}]+)\}/g, '√($1)');
    text = text.replace(/\\approx/g, '≈');
    text = text.replace(/\\neq/g, '≠');
    text = text.replace(/\\leq/g, '≤');
    text = text.replace(/\\geq/g, '≥');
    text = text.replace(/\\pm/g, '±');
    text = text.replace(/\\_/g, '_');
    return marked.parse(text);
  }

  // ── Message rendering ───────────────────────────────────────────────────────
  function addMessage(role, text, meta, extraEl) {
    if (!hasMessages) {
      document.getElementById('empty').remove();
      hasMessages = true;
    }
    const div = document.createElement('div');
    div.className = 'message ' + role;
    if (extraEl) div.appendChild(extraEl);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'agent') {
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }
    div.appendChild(bubble);

    if (meta) {
      const m = document.createElement('div');
      m.className = 'meta';
      m.textContent = meta;
      if (role === 'agent') {
        const sp = document.createElement('button');
        sp.className = 'speak-btn';
        sp.title = 'Read aloud';
        sp.textContent = '🔊';
        sp.onclick = () => speakText(text, sp);
        m.appendChild(sp);
      }
      div.appendChild(m);
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  // ── TTS ─────────────────────────────────────────────────────────────────────
  function speakText(text, btn) {
    if (!window.speechSynthesis) return;
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      btn.textContent = '🔊';
      return;
    }
    const plain = text.replace(/[*_`#>\[\]]/g, '').replace(/\n+/g, ' ');
    const utt = new SpeechSynthesisUtterance(plain);
    utt.onend = () => { btn.textContent = '🔊'; };
    btn.textContent = '⏹';
    window.speechSynthesis.speak(utt);
  }

  // ── Text chat (streaming, falls back to JSON) ───────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage('user', text);

    // Create the agent message bubble immediately
    if (!hasMessages) { document.getElementById('empty').remove(); hasMessages = true; }
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message agent';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = '▍'; // blinking cursor
    msgDiv.appendChild(bubble);
    chat.appendChild(msgDiv);
    chat.scrollTop = chat.scrollHeight;

    let fullText = '';
    let streamOk = false;

    try {
      const res = await fetch('/chat/stream', {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (res.ok && res.body) {
        streamOk = true;
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          for (const line of chunk.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const token = line.slice(6);
            if (token === '[DONE]') break;
            if (token.startsWith('[Stream error')) {
              streamOk = false;
              break;
            }
            fullText += token + ' ';
            bubble.innerHTML = renderMarkdown(fullText) + '<span class="cursor">▍</span>';
            chat.scrollTop = chat.scrollHeight;
          }
        }
        // Remove cursor, render final markdown
        bubble.innerHTML = renderMarkdown(fullText);
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = 'CLAUDE · streaming';
        const sp = document.createElement('button');
        sp.className = 'speak-btn'; sp.title = 'Read aloud'; sp.textContent = '🔊';
        sp.onclick = () => speakText(fullText, sp);
        meta.appendChild(sp);
        msgDiv.appendChild(meta);
      }
    } catch (_) { streamOk = false; }

    // Fallback to regular /chat if streaming failed
    if (!streamOk) {
      bubble.textContent = 'Thinking…';
      msgDiv.classList.add('typing');
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });
        const data = await res.json();
        msgDiv.classList.remove('typing');
        if (res.status === 401) { lockScreen(); return; }
        if (res.ok) {
          bubble.innerHTML = renderMarkdown(data.response);
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = `${data.model_used} · via ${data.routed_by}`;
          const sp = document.createElement('button');
          sp.className = 'speak-btn'; sp.title = 'Read aloud'; sp.textContent = '🔊';
          sp.onclick = () => speakText(data.response, sp);
          meta.appendChild(sp);
          msgDiv.appendChild(meta);
        } else {
          bubble.textContent = '⚠️ ' + (data.detail || 'Something went wrong.');
        }
      } catch { bubble.textContent = '⚠️ Could not reach the server.'; }
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function lockScreen() {
    sessionStorage.removeItem('sa_token');
    accessToken = '';
    document.getElementById('lock-screen').classList.remove('hidden');
  }

  // ── Image upload ────────────────────────────────────────────────────────────
  let selectedImage = null;

  function handleImageSelected() {
    const file = document.getElementById('image-input').files[0];
    if (!file) return;
    selectedImage = file;
    sendImageMessage();
  }

  async function sendImageMessage() {
    if (!selectedImage) return;
    const file = selectedImage;
    selectedImage = null;
    document.getElementById('image-input').value = '';
    const promptText = input.value.trim() || 'Describe this image in detail.';
    input.value = ''; input.style.height = 'auto';
    sendBtn.disabled = true;
    const img = document.createElement('img');
    img.className = 'image-preview';
    img.src = URL.createObjectURL(file);
    addMessage('user', promptText, null, img);
    const typing = addMessage('agent', 'Analysing image…');
    typing.classList.add('typing');
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('prompt', promptText);
      fd.append('session_id', sessionId);
      const res = await fetch('/chat/image', { method: 'POST', headers: authHeaders(), body: fd });
      const data = await res.json();
      typing.remove();
      if (res.status === 401) { lockScreen(); return; }
      if (res.ok) addMessage('agent', data.response, `${data.model_used} · via ${data.routed_by}`);
      else addMessage('agent', '⚠️ ' + (data.detail || 'Image analysis failed.'));
    } catch { typing.remove(); addMessage('agent', '⚠️ Could not reach the server.'); }
    sendBtn.disabled = false; input.focus();
  }

  // ── Audio recording ─────────────────────────────────────────────────────────
  let mediaRecorder = null, audioChunks = [], isRecording = false;

  async function toggleRecording() {
    if (isRecording) stopRecording(); else await startRecording();
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = sendAudioMessage;
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.title = 'Click to stop recording';
    } catch { addMessage('agent', '⚠️ Microphone access denied.'); }
  }

  function stopRecording() {
    if (mediaRecorder && isRecording) {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.title = 'Click to record voice';
    }
  }

  async function sendAudioMessage() {
    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, { type: mimeType });
    sendBtn.disabled = true;
    const typing = addMessage('agent', 'Transcribing…');
    typing.classList.add('typing');
    try {
      const fd = new FormData();
      fd.append('file', blob, 'recording.webm');
      fd.append('session_id', sessionId);
      const res = await fetch('/chat/audio', { method: 'POST', headers: authHeaders(), body: fd });
      const data = await res.json();
      typing.remove();
      if (res.status === 401) { lockScreen(); return; }
      if (res.ok) {
        if (data.transcript) addMessage('user', data.transcript);
        addMessage('agent', data.response, `${data.model_used} · via ${data.routed_by}`);
      } else addMessage('agent', '⚠️ ' + (data.detail || 'Audio transcription failed.'));
    } catch { typing.remove(); addMessage('agent', '⚠️ Could not reach the server.'); }
    sendBtn.disabled = false; input.focus();
  }
</script>
</body>
</html>
