<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #141414;
    }

    header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
    }

    header h1 { font-size: 17px; font-weight: 600; }
    header span { font-size: 12px; color: #666; margin-left: auto; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #6d28d9;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: #1e1e1e;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      padding: 0;
      font-size: 14px;
      line-height: 1;
      transition: color 0.2s;
    }
    .speak-btn:hover { color: #a78bfa; }

    .typing .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #666;
      font-style: italic;
    }

    #input-area {
      padding: 12px 24px;
      border-top: 1px solid #222;
      background: #141414;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e8e8;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.5;
    }

    #input:focus { border-color: #6d28d9; }
    #input::placeholder { color: #444; }

    .icon-btn {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: #888;
      font-size: 18px;
    }
    .icon-btn:hover { border-color: #6d28d9; color: #a78bfa; }
    .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .icon-btn.recording { border-color: #ef4444; color: #ef4444; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
    }

    #send {
      background: #6d28d9;
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send:hover { background: #7c3aed; }
    #send:disabled { background: #333; cursor: not-allowed; }
    #send svg { fill: white; }

    #image-input { display: none; }

    .image-preview {
      max-width: 260px;
      max-height: 180px;
      border-radius: 10px;
      margin-bottom: 6px;
      border: 1px solid #2a2a2a;
    }

    .transcript-label {
      font-size: 11px;
      color: #666;
      font-style: italic;
      margin-bottom: 4px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
    }

    .empty-state h2 { font-size: 20px; color: #666; }
    .empty-state p { font-size: 13px; text-align: center; max-width: 320px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover { border-color: #6d28d9; color: #a78bfa; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Super Agent</h1>
  <span id="session-label">Session: default</span>
</header>

<div id="chat">
  <div class="empty-state" id="empty">
    <h2>Super Agent</h2>
    <p>Multi-model AI with semantic routing — Claude, Gemini, DeepSeek, and GitHub access.<br>Supports text, images, and voice.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="suggest(this)">List my GitHub repos</div>
      <div class="suggestion" onclick="suggest(this)">Write me a short email</div>
      <div class="suggestion" onclick="suggest(this)">Debug this Python error</div>
      <div class="suggestion" onclick="suggest(this)">Explain async/await</div>
    </div>
  </div>
</div>

<div id="input-area">
  <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif,image/webp" onchange="handleImageSelected()" />

  <!-- Image attach -->
  <button class="icon-btn" id="img-btn" title="Attach image" onclick="document.getElementById('image-input').click()">
    🖼
  </button>

  <!-- Audio record -->
  <button class="icon-btn" id="mic-btn" title="Hold to record voice" onclick="toggleRecording()">
    🎙
  </button>

  <textarea id="input" placeholder="Message the super agent..." rows="1"></textarea>

  <button id="send" onclick="sendMessage()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
  const sessionId = 'web-' + Math.random().toString(36).slice(2, 9);
  document.getElementById('session-label').textContent = 'Session: ' + sessionId;

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const micBtn = document.getElementById('mic-btn');
  let hasMessages = false;

  // ── Text auto-resize ────────────────────────────────────────────────────────
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  function suggest(el) {
    input.value = el.textContent;
    sendMessage();
  }

  // ── Message rendering ───────────────────────────────────────────────────────
  function addMessage(role, text, meta, extraEl) {
    if (!hasMessages) {
      document.getElementById('empty').remove();
      hasMessages = true;
    }
    const div = document.createElement('div');
    div.className = 'message ' + role;
    if (extraEl) div.appendChild(extraEl);
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    if (meta) {
      const m = document.createElement('div');
      m.className = 'meta';
      m.textContent = meta;
      if (role === 'agent') {
        const sp = document.createElement('button');
        sp.className = 'speak-btn';
        sp.title = 'Read aloud';
        sp.textContent = '🔊';
        sp.onclick = () => speakText(text, sp);
        m.appendChild(sp);
      }
      div.appendChild(m);
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  // ── TTS ─────────────────────────────────────────────────────────────────────
  function speakText(text, btn) {
    if (!window.speechSynthesis) return;
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      btn.textContent = '🔊';
      return;
    }
    const utt = new SpeechSynthesisUtterance(text);
    utt.onend = () => { btn.textContent = '🔊'; };
    btn.textContent = '⏹';
    window.speechSynthesis.speak(utt);
  }

  // ── Text chat ───────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    const typing = addMessage('agent', 'Thinking…');
    typing.classList.add('typing');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });

      const data = await res.json();
      typing.remove();

      if (res.ok) {
        addMessage('agent', data.response, `${data.model_used} · via ${data.routed_by}`);
      } else {
        addMessage('agent', '⚠️ ' + (data.detail || 'Something went wrong.'));
      }
    } catch (err) {
      typing.remove();
      addMessage('agent', '⚠️ Could not reach the server. Try again.');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // ── Image upload ────────────────────────────────────────────────────────────
  let selectedImage = null;

  function handleImageSelected() {
    const file = document.getElementById('image-input').files[0];
    if (!file) return;
    selectedImage = file;
    sendImageMessage();
  }

  async function sendImageMessage() {
    if (!selectedImage) return;
    const file = selectedImage;
    selectedImage = null;
    document.getElementById('image-input').value = '';

    const promptText = input.value.trim() || 'Describe this image in detail.';
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    // Show preview
    const img = document.createElement('img');
    img.className = 'image-preview';
    img.src = URL.createObjectURL(file);
    addMessage('user', promptText, null, img);

    const typing = addMessage('agent', 'Analysing image…');
    typing.classList.add('typing');

    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('prompt', promptText);
      fd.append('session_id', sessionId);

      const res = await fetch('/chat/image', { method: 'POST', body: fd });
      const data = await res.json();
      typing.remove();

      if (res.ok) {
        addMessage('agent', data.response, `${data.model_used} · via ${data.routed_by}`);
      } else {
        addMessage('agent', '⚠️ ' + (data.detail || 'Image analysis failed.'));
      }
    } catch (err) {
      typing.remove();
      addMessage('agent', '⚠️ Could not reach the server. Try again.');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // ── Audio recording ─────────────────────────────────────────────────────────
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;

  async function toggleRecording() {
    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = sendAudioMessage;
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.title = 'Click to stop recording';
    } catch (err) {
      addMessage('agent', '⚠️ Microphone access denied. Please allow microphone permissions.');
    }
  }

  function stopRecording() {
    if (mediaRecorder && isRecording) {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.title = 'Hold to record voice';
    }
  }

  async function sendAudioMessage() {
    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, { type: mimeType });

    sendBtn.disabled = true;
    const typing = addMessage('agent', 'Transcribing…');
    typing.classList.add('typing');

    try {
      const fd = new FormData();
      fd.append('file', blob, 'recording.webm');
      fd.append('session_id', sessionId);

      const res = await fetch('/chat/audio', { method: 'POST', body: fd });
      const data = await res.json();
      typing.remove();

      if (res.ok) {
        if (data.transcript) {
          const tl = document.createElement('div');
          tl.className = 'transcript-label';
          tl.textContent = '🎙 "' + data.transcript + '"';
          addMessage('user', data.transcript);
        }
        addMessage('agent', data.response, `${data.model_used} · via ${data.routed_by}`);
      } else {
        addMessage('agent', '⚠️ ' + (data.detail || 'Audio transcription failed.'));
      }
    } catch (err) {
      typing.remove();
      addMessage('agent', '⚠️ Could not reach the server. Try again.');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
