<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #141414;
    }

    header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
    }

    header h1 { font-size: 17px; font-weight: 600; }
    header span { font-size: 12px; color: #666; margin-left: auto; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #6d28d9;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: #1e1e1e;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
    }

    .typing .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #666;
      font-style: italic;
    }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #222;
      background: #141414;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e8e8;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.5;
    }

    #input:focus { border-color: #6d28d9; }
    #input::placeholder { color: #444; }

    #send {
      background: #6d28d9;
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send:hover { background: #7c3aed; }
    #send:disabled { background: #333; cursor: not-allowed; }

    #send svg { fill: white; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
    }

    .empty-state h2 { font-size: 20px; color: #666; }
    .empty-state p { font-size: 13px; text-align: center; max-width: 320px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover { border-color: #6d28d9; color: #a78bfa; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Super Agent</h1>
  <span id="session-label">Session: default</span>
</header>

<div id="chat">
  <div class="empty-state" id="empty">
    <h2>Super Agent</h2>
    <p>Multi-model AI with semantic routing — Claude, Gemini, DeepSeek, and GitHub access.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="suggest(this)">List my GitHub repos</div>
      <div class="suggestion" onclick="suggest(this)">Write me a short email</div>
      <div class="suggestion" onclick="suggest(this)">Debug this Python error</div>
      <div class="suggestion" onclick="suggest(this)">Explain async/await</div>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Message the super agent..." rows="1"></textarea>
  <button id="send" onclick="sendMessage()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
  const sessionId = 'web-' + Math.random().toString(36).slice(2, 9);
  document.getElementById('session-label').textContent = 'Session: ' + sessionId;

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let hasMessages = false;

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  function suggest(el) {
    input.value = el.textContent;
    sendMessage();
  }

  function addMessage(role, text, meta) {
    if (!hasMessages) {
      document.getElementById('empty').remove();
      hasMessages = true;
    }
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    if (meta) {
      const m = document.createElement('div');
      m.className = 'meta';
      m.textContent = meta;
      div.appendChild(m);
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);

    const typing = addMessage('agent', 'Thinking…');
    typing.classList.add('typing');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });

      const data = await res.json();
      typing.remove();

      if (res.ok) {
        addMessage('agent', data.response, `${data.model_used} · via ${data.routed_by}`);
      } else {
        addMessage('agent', '⚠️ ' + (data.detail || 'Something went wrong.'));
      }
    } catch (err) {
      typing.remove();
      addMessage('agent', '⚠️ Could not reach the server. Try again.');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
