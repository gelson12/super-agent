<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bridge Office — Living Bot Simulation</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▣</span>
      <span class="title">BRIDGE OFFICE</span>
      <span class="subtitle">Living Bot Simulation</span>
    </div>
    <div class="topbar-controls">
      <div class="floor-pills" role="tablist" aria-label="Floor selector">
        <button class="floor-pill" data-floor="1">L1</button>
        <button class="floor-pill active" data-floor="2">L2</button>
        <button class="floor-pill" data-floor="3">L3</button>
      </div>
      <div class="mode-toggle" role="group" aria-label="Data mode">
        <button class="mode-btn active" data-mode="live">LIVE</button>
        <button class="mode-btn" data-mode="demo">DEMO</button>
      </div>
      <div class="clock" id="clock">--:--</div>
      <button class="hud-toggle" id="hud-toggle" title="Collapse / expand HUD (press 'h')" aria-label="Toggle HUD panel">⇥</button>
      <a class="back-link" href="/static/agents.html">← agents</a>
    </div>
  </header>

  <main class="stage" id="stage">
    <section class="canvas-wrap">
      <canvas id="world" width="1280" height="800" tabindex="0"></canvas>
      <div class="overlay-hint" id="loading-hint">Loading floors and sprites…</div>
      <div class="floor-label" id="floor-label">Level 2</div>
    </section>

    <aside class="hud" id="hud">
      <section class="hud-block">
        <h2 class="hud-title">Bots</h2>
        <ul class="bot-list" id="bot-list"></ul>
      </section>
      <section class="hud-block">
        <h2 class="hud-title">Activity</h2>
        <ul class="activity-log" id="activity-log"></ul>
      </section>
      <section class="hud-block">
        <h2 class="hud-title">Up next</h2>
        <ul class="schedule-list" id="schedule-list"></ul>
      </section>
    </aside>
  </main>

  <footer class="statusbar">
    <span id="status-mode">mode: live</span>
    <span id="status-conn">conn: …</span>
    <span id="status-fps">fps: 60</span>
    <span id="status-bots">bots: 0</span>
  </footer>

  <!-- ─── Sprite editor modal (hidden by default) ───────────────────────── -->
  <div class="modal-backdrop" id="sprite-modal" hidden>
    <div class="modal-card" role="dialog" aria-labelledby="sprite-modal-title">
      <header class="modal-head">
        <h2 id="sprite-modal-title" class="modal-title">Sprite editor — <span id="sprite-modal-bot">…</span></h2>
        <button class="modal-close" id="sprite-modal-close" aria-label="Close">×</button>
      </header>
      <form id="sprite-modal-form" class="modal-body">
        <section class="slot-section">
          <h3 class="slot-section-title">Stand poses</h3>
          <div class="slot-grid" id="slot-grid-stand"></div>
        </section>
        <section class="slot-section">
          <h3 class="slot-section-title">Walk — Down</h3>
          <div class="slot-grid" id="slot-grid-walk-down"></div>
        </section>
        <section class="slot-section">
          <h3 class="slot-section-title">Walk — Left</h3>
          <div class="slot-grid" id="slot-grid-walk-left"></div>
        </section>
        <section class="slot-section">
          <h3 class="slot-section-title">Walk — Right</h3>
          <div class="slot-grid" id="slot-grid-walk-right"></div>
        </section>
        <section class="slot-section">
          <h3 class="slot-section-title">Walk — Up</h3>
          <div class="slot-grid" id="slot-grid-walk-up"></div>
        </section>
        <footer class="modal-foot">
          <span class="modal-status" id="sprite-modal-status"></span>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="sprite-modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" id="sprite-modal-save">Save &amp; Reload</button>
          </div>
        </footer>
      </form>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
