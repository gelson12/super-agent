<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bridge Office — Living Bot Simulation</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">▣</span>
      <span class="title">BRIDGE OFFICE</span>
      <span class="subtitle">Living Bot Simulation</span>
    </div>
    <div class="topbar-controls">
      <div class="floor-pills" role="tablist" aria-label="Floor selector">
        <button class="floor-pill" data-floor="1">L1</button>
        <button class="floor-pill active" data-floor="2">L2</button>
        <button class="floor-pill" data-floor="3">L3</button>
      </div>
      <div class="mode-toggle" role="group" aria-label="Data mode">
        <button class="mode-btn active" data-mode="live">LIVE</button>
        <button class="mode-btn" data-mode="demo">DEMO</button>
      </div>
      <div class="clock" id="clock">--:--</div>
      <button class="hud-toggle" id="hud-toggle" title="Collapse / expand HUD (press 'h')" aria-label="Toggle HUD panel">⇥</button>
      <a class="back-link" href="/static/agents.html">← agents</a>
    </div>
  </header>

  <main class="stage" id="stage">
    <section class="canvas-wrap">
      <canvas id="world" width="1280" height="800" tabindex="0"></canvas>
      <div class="overlay-hint" id="loading-hint">Loading floors and sprites…</div>
      <div class="floor-label" id="floor-label">Level 2</div>
    </section>

    <aside class="hud" id="hud">
      <section class="hud-block">
        <h2 class="hud-title">Bots</h2>
        <ul class="bot-list" id="bot-list"></ul>
      </section>
      <section class="hud-block">
        <h2 class="hud-title">Activity</h2>
        <ul class="activity-log" id="activity-log"></ul>
      </section>
      <section class="hud-block">
        <h2 class="hud-title">Up next</h2>
        <ul class="schedule-list" id="schedule-list"></ul>
      </section>
    </aside>
  </main>

  <footer class="statusbar">
    <span id="status-mode">mode: live</span>
    <span id="status-conn">conn: …</span>
    <span id="status-fps">fps: 60</span>
    <span id="status-bots">bots: 0</span>
  </footer>

  <!-- Approval modal -->
  <div id="approval-modal" style="display:none;position:fixed;inset:0;z-index:9999;
    background:rgba(0,0,0,.65);backdrop-filter:blur(4px);align-items:center;justify-content:center">
    <div style="background:#0f1923;border:1px solid #2a3f55;border-radius:12px;
      max-width:560px;width:calc(100% - 2rem);max-height:80vh;overflow-y:auto;
      box-shadow:0 8px 48px rgba(0,0,0,.8);font-family:inherit;color:#e0e8f0">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;
        padding:1rem 1.25rem .75rem;border-bottom:1px solid #1e3048">
        <div style="display:flex;align-items:center;gap:.6rem">
          <span style="font-size:1.3rem">📬</span>
          <span style="font-weight:700;font-size:1rem;color:#7dd3fc">Pending Approvals</span>
        </div>
        <button id="modal-close" style="background:none;border:none;color:#64748b;
          font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px"
          title="Close">✕</button>
      </div>

      <!-- Proposal list -->
      <div id="modal-proposals" style="padding:.75rem 1.25rem 1.25rem">
        <p style="color:#64748b;font-size:.85rem">Loading…</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
