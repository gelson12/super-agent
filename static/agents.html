<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Agent - Office</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: #2d1f0e;
      color: #e8e8e8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .header {
      background: #1a1208;
      border-bottom: 4px solid #4a3520;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 0.7rem;
      color: #c9a96e;
      letter-spacing: 1px;
    }

    .header .back-link {
      font-size: 0.5rem;
      color: #6cb4ff;
      text-decoration: none;
    }

    .header .back-link:hover { text-decoration: underline; }

    .header .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 8px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Office floor ────────────────────────────────────────────── */
    .office {
      background:
        repeating-linear-gradient(
          90deg,
          #3d2b16 0px, #3d2b16 80px,
          #4a3520 80px, #4a3520 82px
        ),
        repeating-linear-gradient(
          0deg,
          #3d2b16 0px, #3d2b16 40px,
          #352517 40px, #352517 42px
        );
      padding: 30px 20px;
      min-height: calc(100vh - 50px);
    }

    /* ── Section labels ──────────────────────────────────────────── */
    .section-label {
      font-size: 0.5rem;
      color: #8b7355;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      padding-left: 8px;
      border-left: 3px solid #6b5337;
    }

    /* ── Desk grid ───────────────────────────────────────────────── */
    .desks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }

    /* ── Single desk ─────────────────────────────────────────────── */
    .desk {
      position: relative;
      background: #2a1e10;
      border: 2px solid #5a4430;
      border-radius: 4px;
      padding: 10px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: border-color 0.3s;
    }

    .desk:hover {
      border-color: #8b7355;
    }

    /* Worker name */
    .desk .name {
      font-size: 0.45rem;
      color: #d4b896;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    /* Status label */
    .desk .status-label {
      font-size: 0.4rem;
      padding: 2px 6px;
      border-radius: 2px;
      margin-bottom: 8px;
      text-transform: lowercase;
    }

    .status-label.working { background: #1e3a5f; color: #60a5fa; }
    .status-label.idle { background: #14532d; color: #4ade80; }
    .status-label.sleeping { background: #333; color: #888; }
    .status-label.talking { background: #4c1d95; color: #c4b5fd; }
    .status-label.strike { background: #7f1d1d; color: #fca5a5; }
    .status-label.sick { background: #713f12; color: #fde68a; }

    /* ── Monitor (screen) ────────────────────────────────────────── */
    .monitor {
      width: 100px;
      height: 65px;
      border: 3px solid #555;
      border-radius: 4px;
      margin-bottom: 4px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    /* Monitor stand */
    .monitor::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 8px;
      background: #555;
      border-radius: 0 0 3px 3px;
    }

    /* Screen states */
    .monitor.off {
      background: #111;
      border-color: #444;
    }

    .monitor.on-blue {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      border-color: #3b82f6;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
    }

    .monitor.on-green {
      background: linear-gradient(135deg, #14532d 0%, #16a34a 100%);
      border-color: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.2);
    }

    .monitor.on-purple {
      background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%);
      border-color: #8b5cf6;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
    }

    .monitor.on-red {
      background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%);
      border-color: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.3);
    }

    .monitor.on-yellow {
      background: linear-gradient(135deg, #713f12 0%, #ca8a04 100%);
      border-color: #eab308;
      box-shadow: 0 0 8px rgba(234, 179, 8, 0.3);
    }

    /* Screen content */
    .screen-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.35rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 4px;
      line-height: 1.4;
    }

    /* Blinking cursor on working screen */
    .monitor.on-blue .screen-content::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Worker avatar ───────────────────────────────────────────── */
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #4a3520;
      border: 2px solid #8b7355;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-top: 12px;
      position: relative;
    }

    /* Zzz animation for sleeping */
    .zzz {
      position: absolute;
      top: -14px;
      right: -10px;
      font-size: 0.4rem;
      color: #888;
      animation: float-zzz 2s ease-in-out infinite;
    }

    @keyframes float-zzz {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-6px); opacity: 0.4; }
    }

    /* Strike sign */
    .strike-sign {
      position: absolute;
      top: -18px;
      right: -14px;
      font-size: 12px;
      animation: shake 0.5s ease-in-out infinite alternate;
    }

    @keyframes shake {
      0% { transform: rotate(-5deg); }
      100% { transform: rotate(5deg); }
    }

    /* Sick indicator */
    .sick-indicator {
      position: absolute;
      top: -16px;
      right: -12px;
      font-size: 12px;
    }

    /* Talk bubble */
    .talk-bubble {
      position: absolute;
      top: -20px;
      left: -14px;
      font-size: 10px;
      animation: talk-bounce 0.8s ease-in-out infinite alternate;
    }

    @keyframes talk-bounce {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-3px) scale(1.1); }
    }

    /* ── Desk surface ────────────────────────────────────────────── */
    .desk-surface {
      width: 120px;
      height: 8px;
      background: linear-gradient(180deg, #8b6f47 0%, #6b5337 100%);
      border-radius: 2px;
      margin-top: 2px;
    }

    /* ── Last worked info ────────────────────────────────────────── */
    .last-worked {
      font-size: 0.3rem;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }

    /* ── Talking to info ─────────────────────────────────────────── */
    .talking-to {
      font-size: 0.3rem;
      color: #c4b5fd;
      margin-top: 4px;
      text-align: center;
    }

    /* ── Task info ────────────────────────────────────────────────── */
    .task-info {
      font-size: 0.3rem;
      color: #60a5fa;
      margin-top: 4px;
      text-align: center;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Decorative elements ─────────────────────────────────────── */
    .plant {
      position: absolute;
      font-size: 16px;
    }

    .filing-cabinet {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 24px;
      opacity: 0.5;
    }

    /* ── Legend ───────────────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      padding: 10px;
      background: #1a1208;
      border-radius: 4px;
      border: 1px solid #3d2b16;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.35rem;
      color: #8b7355;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    /* ── Stats bar ────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
      padding: 10px 14px;
      background: #1a1208;
      border-radius: 4px;
      border: 1px solid #3d2b16;
      align-items: center;
    }

    .stat-item {
      font-size: 0.4rem;
      color: #8b7355;
    }

    .stat-item .stat-value {
      font-size: 0.55rem;
      color: #c9a96e;
      margin-left: 6px;
    }

    .refresh-indicator {
      font-size: 0.35rem;
      color: #555;
      margin-left: auto;
    }

    .refresh-indicator .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* Clickable cursor on desks */
    .desk { cursor: pointer; }

    /* ── Log panel drawer ────────────────────────────────────────────── */
    #log-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    #log-overlay.open { display: block; }

    #log-panel {
      position: fixed;
      top: 0;
      right: -440px;
      width: 420px;
      max-width: 95vw;
      height: 100vh;
      background: #1a1208;
      border-left: 3px solid #4a3520;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      transition: right 0.28s ease;
      overflow: hidden;
    }
    #log-panel.open { right: 0; }

    .log-panel-header {
      background: #0f0b05;
      border-bottom: 2px solid #3d2b16;
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .log-panel-avatar { font-size: 28px; }
    .log-panel-title { flex: 1; }
    .log-panel-name {
      font-size: 0.55rem;
      color: #c9a96e;
      display: block;
      margin-bottom: 4px;
    }
    .log-panel-state {
      font-size: 0.38rem;
      padding: 2px 6px;
      border-radius: 2px;
    }
    .log-close-btn {
      background: none;
      border: 1px solid #4a3520;
      color: #8b7355;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 2px;
    }
    .log-close-btn:hover { border-color: #c9a96e; color: #c9a96e; }

    .log-panel-refresh {
      padding: 5px 16px;
      font-size: 0.3rem;
      color: #555;
      border-bottom: 1px solid #2a1e10;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-refresh-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    #log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #log-entries::-webkit-scrollbar { width: 4px; }
    #log-entries::-webkit-scrollbar-track { background: #111; }
    #log-entries::-webkit-scrollbar-thumb { background: #4a3520; }

    .log-empty {
      padding: 24px 16px;
      font-size: 0.38rem;
      color: #555;
      text-align: center;
    }
    .log-entry {
      padding: 7px 16px;
      border-bottom: 1px solid #1f1508;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .log-entry:hover { background: #1f1508; }
    .log-entry-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
    .log-entry-body { flex: 1; min-width: 0; }
    .log-entry-event {
      font-size: 0.35rem;
      font-weight: bold;
      margin-bottom: 2px;
    }
    .log-entry-detail {
      font-size: 0.3rem;
      color: #8b7355;
      word-break: break-all;
      line-height: 1.5;
    }
    .log-entry-time { font-size: 0.28rem; color: #555; margin-top: 3px; }

    /* Event-type colours */
    .log-entry.ev-working   .log-entry-event { color: #60a5fa; }
    .log-entry.ev-done      .log-entry-event { color: #4ade80; }
    .log-entry.ev-sick      .log-entry-event { color: #fde68a; }
    .log-entry.ev-strike    .log-entry-event { color: #fca5a5; }
    .log-entry.ev-talking   .log-entry-event { color: #c4b5fd; }
    .log-entry.ev-done_talking .log-entry-event { color: #a78bfa; }
    .log-entry.ev-request   .log-entry-event { color: #34d399; }
    .log-entry.ev-error     .log-entry-event { color: #f87171; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .desks {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .desk { min-height: 170px; }
      .monitor { width: 80px; height: 52px; }
      .header h1 { font-size: 0.55rem; }
      .stats-bar { gap: 10px; }
      #log-panel { width: 100vw; }
    }

    @media (max-width: 380px) {
      .desks {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .desk { min-height: 150px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <span class="status-dot"></span>
    <h1 style="display:inline">SUPER AGENT OFFICE</h1>
  </div>
  <a href="/" class="back-link">&larr; BACK TO CHAT</a>
</div>

<div class="office">
  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Working</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Idle</div>
    <div class="legend-item"><div class="legend-dot" style="background:#555"></div> Sleeping</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div> Talking</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Strike</div>
    <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div> Sick</div>
  </div>

  <!-- Summary stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item">Working: <span class="stat-value" id="count-working">0</span></div>
    <div class="stat-item">Idle: <span class="stat-value" id="count-idle">0</span></div>
    <div class="stat-item">Sleeping: <span class="stat-value" id="count-sleeping">0</span></div>
    <div class="stat-item">Issues: <span class="stat-value" id="count-issues">0</span></div>
    <div class="refresh-indicator"><span class="dot"></span>Live (5s)</div>
  </div>

  <!-- Models section -->
  <div class="section-label">LLM Models</div>
  <div class="desks" id="models-desks"></div>

  <!-- Agents section -->
  <div class="section-label">Specialized Agents</div>
  <div class="desks" id="agents-desks"></div>
</div>

<div class="filing-cabinet">🗄️</div>
<svg id="talking-lines" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;"></svg>

<!-- Log panel overlay + drawer -->
<div id="log-overlay"></div>
<div id="log-panel">
  <div class="log-panel-header">
    <div class="log-panel-avatar" id="log-avatar">👤</div>
    <div class="log-panel-title">
      <span class="log-panel-name" id="log-worker-name">Agent</span>
      <span class="log-panel-state status-label sleeping" id="log-worker-state">sleeping</span>
    </div>
    <button class="log-close-btn" onclick="closeLog()">✕</button>
  </div>
  <div class="log-panel-refresh">
    <span><span class="log-refresh-dot"></span>Live (10s)</span>
    <span id="log-count" style="color:#555"></span>
  </div>
  <div id="log-entries">
    <div class="log-empty">No activity recorded yet</div>
  </div>
</div>

<script>
const MODEL_WORKERS = [
  "Claude CLI Pro", "Gemini CLI", "Anthropic Haiku",
  "Sonnet Anthropic", "Opus Anthropic", "DeepSeek"
];
const AGENT_WORKERS = [
  "Shell Agent", "GitHub Agent", "N8N Agent", "Self-Improve Agent"
];

const AVATARS = {
  "Claude CLI Pro": "👨🏿‍💻",
  "Gemini CLI": "👩🏼‍💻",
  "Anthropic Haiku": "🧑🏻‍💻",
  "Sonnet Anthropic": "👨🏽‍🔧",
  "Opus Anthropic": "👩🏻‍🔬",
  "DeepSeek": "🧑🏽‍🔬",
  "Shell Agent": "👷🏼",
  "GitHub Agent": "👷🏿‍♀️",
  "N8N Agent": "👷🏽‍♂️",
  "Self-Improve Agent": "🧑🏼‍🏫",
};

const EVENT_ICONS = {
  working:      "🔵",
  done:         "✅",
  sick:         "🤒",
  strike:       "🪧",
  talking:      "💬",
  done_talking: "🤝",
  request:      "📨",
  error:        "❌",
};

const EVENT_LABELS = {
  working:      "Started working",
  done:         "Completed task",
  sick:         "Token error",
  strike:       "On strike",
  talking:      "Collaborating",
  done_talking: "Collaboration ended",
  request:      "Handled request",
  error:        "Request failed",
};

// ── Helpers ────────────────────────────────────────────────────────────────

function formatTimeAgo(seconds) {
  if (!seconds && seconds !== 0) return "never";
  if (seconds < 60) return `${seconds}s ago`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
  return `${Math.floor(seconds / 86400)}d ago`;
}

function formatDateTime(ts) {
  if (!ts) return "";
  const d = new Date(ts * 1000);
  return d.toLocaleString(undefined, {
    month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit"
  });
}

function getMonitorClass(state) {
  switch (state) {
    case "working": return "on-blue";
    case "idle":    return "on-green";
    case "talking": return "on-purple";
    case "strike":  return "on-red";
    case "sick":    return "on-yellow";
    default:        return "off";
  }
}

function getScreenContent(worker) {
  switch (worker.state) {
    case "working":  return worker.task ? esc(worker.task.substring(0, 40)) : "Processing";
    case "idle":     return "Ready";
    case "sleeping": return "";
    case "talking":  return `w/ ${esc(worker.talking_to || "?")}`;
    case "strike":   return "NO CREDITS!";
    case "sick":     return "TOKEN ERR";
    default:         return "";
  }
}

function getOverlay(worker) {
  switch (worker.state) {
    case "sleeping": return '<span class="zzz">Zzz</span>';
    case "strike":   return '<span class="strike-sign">🪧</span>';
    case "sick":     return '<span class="sick-indicator">🤒</span>';
    case "talking":  return '<span class="talk-bubble">💬</span>';
    default:         return "";
  }
}

function esc(str) {
  if (!str) return "";
  const d = document.createElement("div");
  d.textContent = String(str);
  return d.innerHTML;
}

// ── Desk rendering ─────────────────────────────────────────────────────────

function renderDesk(worker) {
  const monitorClass  = getMonitorClass(worker.state);
  const screenContent = getScreenContent(worker);
  const overlay       = getOverlay(worker);
  const avatar        = AVATARS[worker.id] || "👤";
  const timeAgo       = worker.last_worked_ago != null ? formatTimeAgo(worker.last_worked_ago) : "";
  const dateStr       = worker.last_worked ? formatDateTime(worker.last_worked) : "";

  let extras = "";
  if (worker.state === "talking" && worker.talking_to)
    extras += `<div class="talking-to">talking to ${esc(worker.talking_to)}</div>`;
  if (worker.state === "working" && worker.task)
    extras += `<div class="task-info">${esc(worker.task)}</div>`;

  const tooltip = worker.last_worked > 0
    ? `Last active: ${dateStr} (${timeAgo}) — click for activity log`
    : `${worker.id} — never active — click for activity log`;

  return `
    <div class="desk" data-worker="${esc(worker.id)}" data-state="${worker.state}"
         title="${esc(tooltip)}" onclick="openLog(this.dataset.worker)">
      <div class="name">${esc(worker.id)}</div>
      <div class="status-label ${worker.state}">${worker.state}</div>
      <div class="monitor ${monitorClass}">
        <div class="screen-content">${screenContent}</div>
      </div>
      <div class="desk-surface"></div>
      <div class="avatar">
        ${avatar}
        ${overlay}
      </div>
      ${timeAgo ? `<div class="last-worked">${timeAgo}${dateStr ? " (" + dateStr + ")" : ""}</div>` : ""}
      ${extras}
    </div>
  `;
}

function renderAll(workers) {
  const workerMap = {};
  workers.forEach(w => workerMap[w.id] = w);

  const allIds     = [...MODEL_WORKERS, ...AGENT_WORKERS];
  const allWorkers = allIds.map(id =>
    workerMap[id] || { id, state: "sleeping", last_worked: 0, last_worked_ago: null, talking_to: null, task: "" }
  );

  // Update stats bar
  const counts = { working: 0, idle: 0, sleeping: 0, issues: 0 };
  allWorkers.forEach(w => {
    if (w.state === "working")                         counts.working++;
    else if (w.state === "idle")                       counts.idle++;
    else if (w.state === "strike" || w.state === "sick") counts.issues++;
    else                                               counts.sleeping++;
  });
  document.getElementById("count-working").textContent  = counts.working;
  document.getElementById("count-idle").textContent     = counts.idle;
  document.getElementById("count-sleeping").textContent = counts.sleeping;
  document.getElementById("count-issues").textContent   = counts.issues;

  document.getElementById("models-desks").innerHTML =
    MODEL_WORKERS.map(id => renderDesk(
      workerMap[id] || { id, state: "sleeping", last_worked: 0, last_worked_ago: null, talking_to: null, task: "" }
    )).join("");

  document.getElementById("agents-desks").innerHTML =
    AGENT_WORKERS.map(id => renderDesk(
      workerMap[id] || { id, state: "sleeping", last_worked: 0, last_worked_ago: null, talking_to: null, task: "" }
    )).join("");

  // Update open log panel header state if it's showing a worker
  if (_logPanelWorker && workerMap[_logPanelWorker]) {
    const w = workerMap[_logPanelWorker];
    const stateEl = document.getElementById("log-worker-state");
    stateEl.textContent = w.state;
    stateEl.className   = `log-panel-state status-label ${w.state}`;
  }
}

function drawTalkingLines(workers) {
  const svg = document.getElementById('talking-lines');
  if (!svg) return;
  svg.innerHTML = '';
  const pairs = new Set();
  workers.forEach(w => {
    if (w.state === 'talking' && w.talking_to) {
      const key = [w.id, w.talking_to].sort().join('|');
      if (pairs.has(key)) return;
      pairs.add(key);
      const a = document.querySelector(`[data-worker="${CSS.escape(w.id)}"]`);
      const b = document.querySelector(`[data-worker="${CSS.escape(w.talking_to)}"]`);
      if (!a || !b) return;
      const ra = a.getBoundingClientRect();
      const rb = b.getBoundingClientRect();
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', ra.left + ra.width / 2);
      line.setAttribute('y1', ra.top  + ra.height / 2);
      line.setAttribute('x2', rb.left + rb.width / 2);
      line.setAttribute('y2', rb.top  + rb.height / 2);
      line.setAttribute('stroke', '#8b5cf6');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('stroke-dasharray', '6,4');
      line.setAttribute('opacity', '0.7');
      const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
      anim.setAttribute('attributeName', 'stroke-dashoffset');
      anim.setAttribute('from', '0');
      anim.setAttribute('to', '20');
      anim.setAttribute('dur', '1s');
      anim.setAttribute('repeatCount', 'indefinite');
      line.appendChild(anim);
      svg.appendChild(line);
    }
  });
}

// ── Log panel ──────────────────────────────────────────────────────────────

let _logPanelWorker  = null;
let _logRefreshTimer = null;

async function openLog(workerId) {
  _logPanelWorker = workerId;

  // Header
  document.getElementById("log-avatar").textContent      = AVATARS[workerId] || "👤";
  document.getElementById("log-worker-name").textContent = workerId;
  document.getElementById("log-entries").innerHTML =
    '<div class="log-empty">Loading…</div>';
  document.getElementById("log-count").textContent = "";

  // Open drawer
  document.getElementById("log-overlay").classList.add("open");
  document.getElementById("log-panel").classList.add("open");

  // Fetch immediately, then every 10 seconds
  await fetchLog(workerId);
  clearInterval(_logRefreshTimer);
  _logRefreshTimer = setInterval(() => {
    if (_logPanelWorker) fetchLog(_logPanelWorker);
  }, 10000);
}

function closeLog() {
  document.getElementById("log-overlay").classList.remove("open");
  document.getElementById("log-panel").classList.remove("open");
  clearInterval(_logRefreshTimer);
  _logPanelWorker = null;
}

async function fetchLog(workerId) {
  try {
    const resp = await fetch(`/dashboard/agents/${encodeURIComponent(workerId)}/log?limit=60`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderLog(data);
  } catch (err) {
    document.getElementById("log-entries").innerHTML =
      `<div class="log-empty">Error loading log: ${esc(String(err))}</div>`;
  }
}

function renderLog(data) {
  const events = data.events || [];
  const countEl = document.getElementById("log-count");
  countEl.textContent = events.length ? `${events.length} entries` : "";

  if (!events.length) {
    document.getElementById("log-entries").innerHTML =
      '<div class="log-empty">No activity recorded yet.<br><br>Activity will appear here once this agent handles a request or changes state.</div>';
    return;
  }

  const html = events.map(e => {
    const evType  = e.event || "unknown";
    const icon    = EVENT_ICONS[evType]  || "▪️";
    const label   = EVENT_LABELS[evType] || evType;
    const detail  = e.detail || "";
    const timeStr = e.date  || (e.ts ? new Date(e.ts * 1000).toLocaleString() : "");
    const src     = e.type === "request" ? " · insight" : e.type === "state" ? " · state" : "";

    return `
      <div class="log-entry ev-${esc(evType)}">
        <div class="log-entry-icon">${icon}</div>
        <div class="log-entry-body">
          <div class="log-entry-event">${esc(label)}</div>
          ${detail ? `<div class="log-entry-detail">${esc(detail)}</div>` : ""}
          <div class="log-entry-time">${esc(timeStr)}${src}</div>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("log-entries").innerHTML = html;
}

// Close on overlay click or ESC
document.getElementById("log-overlay").addEventListener("click", closeLog);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLog(); });

// ── Main status poll ───────────────────────────────────────────────────────

async function fetchAndRender() {
  try {
    const resp = await fetch("/dashboard/agents/status");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const workers = data.workers || [];
    renderAll(workers);
    drawTalkingLines(workers);
  } catch (err) {
    console.error("Failed to fetch agent status:", err);
  }
}

fetchAndRender();
setInterval(fetchAndRender, 5000);
</script>
